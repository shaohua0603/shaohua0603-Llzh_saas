<svg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <!-- 金币背景 -->
  <defs>
    <linearGradient id="coinGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="25%" stop-color="#FFC107"/>
      <stop offset="50%" stop-color="#FFA000"/>
      <stop offset="75%" stop-color="#FFC107"/>
      <stop offset="100%" stop-color="#FFD700"/>
    </linearGradient>
    <radialGradient id="coinShine" cx="35%" cy="35%" r="60%" fx="35%" fy="35%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.9"/>
      <stop offset="30%" stop-color="#FFFFFF" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#FFFFFF" stop-opacity="0.1"/>
      <stop offset="70%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
  </defs>
  
  <!-- 金币主体 -->
  <g>
    <!-- 金币外圈 -->
    <circle cx="250" cy="250" r="220" fill="#D4AF37"/>
    <!-- 金币内圈 -->
    <circle cx="250" cy="250" r="210" fill="url(#coinGradient)"/>
    <!-- 金币光泽 -->
    <circle cx="250" cy="250" r="210" fill="url(#coinShine)"/>
    <!-- 金币边缘 -->
    <circle cx="250" cy="250" r="210" fill="none" stroke="#B8860B" stroke-width="6"/>
    
    <!-- 中心Logo -->
    <g transform="translate(250, 250) scale(1.2)">
      <!-- 波浪形状 -->
      <path d="M-80,0 C-60,-20 -40,-10 -20,-30 C0,-50 20,-40 40,-60 C60,-80 80,-70 100,-90" fill="none" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round"/>
      <path d="M-70,20 C-50,0 -30,10 -10,-10 C10,-30 30,-20 50,-40 C70,-60 90,-50 110,-70" fill="none" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round"/>
      <path d="M-60,40 C-40,20 -20,30 0,10 C20,-10 40,0 60,-20 C80,-40 100,-30 120,-50" fill="none" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round"/>
      
      <!-- 圆点 -->
      <circle cx="-20" cy="-10" r="8" fill="#FFFFFF"/>
      <circle cx="0" cy="-30" r="10" fill="#FFFFFF"/>
      <circle cx="20" cy="-20" r="8" fill="#FFFFFF"/>
      <circle cx="40" cy="-40" r="10" fill="#FFFFFF"/>
      <circle cx="60" cy="-30" r="8" fill="#FFFFFF"/>
      <circle cx="80" cy="-50" r="10" fill="#FFFFFF"/>
      <circle cx="100" cy="-40" r="8" fill="#FFFFFF"/>
    </g>
  </g>
</svg>